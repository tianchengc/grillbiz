<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Cards Showcase - {{COMPANY}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Base Global Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b0c10;
            color: #f1f3f9;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d2ff, #ff7b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .style-selector {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f3f9;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
        }

        .style-selector:hover {
            border-color: #00d2ff;
        }

        .btn-download-all {
            background: linear-gradient(135deg, #00d2ff, #0084ff);
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-download-all:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* Card Section Layout */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .team-member-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .member-info h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #00d2ff;
        }

        .member-info p {
            font-size: 0.95rem;
            color: #9ba3b2;
        }

        .card-row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Business Card Canvas (3.5" x 2" ratio, 1050x600px for print quality) */
        .business-card {
            width: 1050px;
            height: 600px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            padding: 60px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            transform: scale(0.48); /* Scaled down for screen display */
            transform-origin: top center;
            margin-bottom: -312px; /* Pull up elements below due to scaling */
        }

        .card-label {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ba3b2;
        }

        .btn-save-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f1f3f9;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save-card:hover {
            background: #00d2ff;
            color: #0b0c10;
            border-color: #00d2ff;
        }

        /* ---------------------------------------------------- */
        /* THEME 1: GLASSMORPHISM */
        /* ---------------------------------------------------- */
        body.theme-glassmorphism {
            background-color: #0d0f14;
        }
        .theme-glassmorphism .business-card {
            background: linear-gradient(135deg, rgba(20, 24, 33, 0.8) 0%, rgba(10, 12, 18, 0.9) 100%);
            border: 2px solid rgba(0, 210, 255, 0.25);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(0, 210, 255, 0.05);
        }
        .theme-glassmorphism .business-card::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
        }
        .theme-glassmorphism .business-card::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 123, 0, 0.1) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            pointer-events: none;
        }

        /* ---------------------------------------------------- */
        /* THEME 2: MINIMALIST DARK */
        /* ---------------------------------------------------- */
        body.theme-dark-minimalist {
            background-color: #050505;
        }
        .theme-dark-minimalist .business-card {
            background: #0a0a0a;
            border: 1px solid #1c1c1c;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        .theme-dark-minimalist .business-card .logo-container img {
            filter: grayscale(100%) brightness(1.2);
        }

        /* ---------------------------------------------------- */
        /* THEME 3: BOLD VIBRANT GRADIENT */
        /* ---------------------------------------------------- */
        body.theme-gradient-bold {
            background-color: #120924;
        }
        .theme-gradient-bold .business-card {
            background: linear-gradient(135deg, #1b0a3a 0%, #0d0f26 50%, #290a20 100%);
            border: 3px solid rgba(255, 0, 128, 0.2);
            box-shadow: 0 15px 50px rgba(255, 0, 128, 0.15);
        }
        .theme-gradient-bold .business-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #ff007b, #00ffcc, #ff7b00);
        }

        /* ---------------------------------------------------- */
        /* THEME 4: CLASSIC LIGHT */
        /* ---------------------------------------------------- */
        body.theme-classic-light {
            background-color: #e2e8f0;
            color: #1e293b;
        }
        .theme-classic-light h1 {
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .theme-classic-light header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .theme-classic-light .team-member-section {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .theme-classic-light .business-card {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #0f172a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .theme-classic-light .card-label {
            color: #64748b;
        }
        .theme-classic-light .btn-save-card {
            background: #0f172a;
            color: #fff;
            border: none;
        }
        .theme-classic-light .btn-save-card:hover {
            background: #334155;
            color: #fff;
        }

        /* ---------------------------------------------------- */
        /* CARD INNER STRUCTURE (FRONT & BACK) */
        /* ---------------------------------------------------- */
        
        /* Front Design Layout (Centered Logo & Company) */
        .card-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            gap: 20px;
        }

        .card-front .logo-container img {
            max-height: 150px;
            max-width: 400px;
            object-fit: contain;
        }

        .card-front .company-name {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* Back Design Layout (Info Panel) */
        .card-back {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-between;
        }

        .back-left {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .back-left h2 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .back-left .role {
            font-size: 1.4rem;
            font-weight: 500;
            color: #00d2ff;
            margin-bottom: 20px;
        }

        .theme-classic-light .back-left .role {
            color: #0284c7;
        }

        .back-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            gap: 15px;
            border-left: 2px solid var(--sub-border);
            padding-left: 40px;
            height: 80%;
            justify-content: center;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .info-val {
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>
<body class="theme-glassmorphism">
    <div class="container">
        <header>
            <h1 id="header-title">Business Cards: {{COMPANY}}</h1>
            <div class="controls">
                <select class="style-selector" onchange="changeTheme(this.value)">
                    <option value="theme-glassmorphism">Glassmorphism Theme</option>
                    <option value="theme-dark-minimalist">Minimalist Dark Theme</option>
                    <option value="theme-gradient-bold">Gradient Bold Theme</option>
                    <option value="theme-classic-light">Classic Light Theme</option>
                </select>
                <button class="btn-download-all" onclick="downloadAll()">Download All PNGs</button>
            </div>
        </header>

        <div class="cards-list" id="member-cards-container">
            <!-- Dynamic Injection via JS -->
        </div>
    </div>

    <script>
        // The parsed JSON array of team cards injected from Python
        const cardsData = {{CARDS_DATA_JSON}};

        function changeTheme(themeName) {
            document.body.className = themeName;
        }

        function renderCards() {
            const container = document.getElementById('member-cards-container');
            container.innerHTML = '';

            cardsData.forEach((member, index) => {
                const section = document.createElement('div');
                section.className = 'team-member-section';

                section.innerHTML = `
                    <div class="member-header">
                        <div class="member-info">
                            <h3>${member.name}</h3>
                            <p>${member.role}</p>
                        </div>
                    </div>
                    <div class="card-row">
                        <!-- FRONT CARD -->
                        <div class="card-wrapper">
                            <span class="card-label">Front Side</span>
                            <div class="business-card" id="card-front-${index}">
                                <div class="card-front">
                                    <div class="logo-container">
                                        <img src="${member.logo_url}" alt="Company Logo" onerror="this.style.display='none'; document.getElementById('company-text-${index}').style.display='block';">
                                    </div>
                                    <div class="company-name" id="company-text-${index}" style="display:none;">${member.company}</div>
                                </div>
                            </div>
                            <button class="btn-save-card" onclick="saveCard('card-front-${index}', '${member.name.replace(/\s+/g, '_')}_front')">Save Front PNG</button>
                        </div>

                        <!-- BACK CARD -->
                        <div class="card-wrapper">
                            <span class="card-label">Back Side</span>
                            <div class="business-card" id="card-back-${index}">
                                <div class="card-back">
                                    <div class="back-left">
                                        <h2>${member.name}</h2>
                                        <div class="role">${member.role}</div>
                                        <div class="info-item">
                                            <span class="card-label" style="font-size:0.75rem;">Company</span>
                                            <span class="info-val" style="font-weight:700;">${member.company}</span>
                                        </div>
                                    </div>
                                    <div class="back-right">
                                        <div class="info-item">
                                            <span class="card-label" style="font-size:0.75rem;">Email</span>
                                            <span class="info-val">${member.email}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="card-label" style="font-size:0.75rem;">Phone</span>
                                            <span class="info-val">${member.phone}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="card-label" style="font-size:0.75rem;">Website</span>
                                            <span class="info-val">${member.website}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button class="btn-save-card" onclick="saveCard('card-back-${index}', '${member.name.replace(/\s+/g, '_')}_back')">Save Back PNG</button>
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function saveCard(cardId, filename) {
            const cardEl = document.getElementById(cardId);
            
            // Remove transform scale temporary for clean screenshotting
            const originalTransform = cardEl.style.transform;
            const originalMargin = cardEl.style.marginBottom;
            cardEl.style.transform = 'none';
            cardEl.style.marginBottom = '0';

            html2canvas(cardEl, {
                scale: 2, // High resolution scale factor
                backgroundColor: null, // Transparent background if corners are rounded
                useCORS: true // Allow loading external logos
            }).then(canvas => {
                // Restore original scale styles
                cardEl.style.transform = originalTransform;
                cardEl.style.marginBottom = originalMargin;

                const link = document.createElement('a');
                link.download = `${filename}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function downloadAll() {
            cardsData.forEach((member, index) => {
                setTimeout(() => {
                    saveCard(`card-front-${index}`, `${member.name.replace(/\s+/g, '_')}_front`);
                }, index * 1000);
                setTimeout(() => {
                    saveCard(`card-back-${index}`, `${member.name.replace(/\s+/g, '_')}_back`);
                }, (index * 1000) + 500);
            });
        }

        // Run
        renderCards();
    </script>
</body>
</html>
