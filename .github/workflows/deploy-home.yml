name: Deploy Homepage to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'grill-home/boilerplate/src/data/site-config.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: 20
          cache: 'npm'
          cache-dependency-path: 'grill-home/boilerplate/package-lock.json'

      - name: Install Dependencies
        run: |
          cd grill-home/boilerplate
          npm ci

      - name: Build Next.js Static Export
        run: |
          cd grill-home/boilerplate
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'grillbiz-home'
          directory: 'grill-home/boilerplate/out'
          gitBranch: 'main'
