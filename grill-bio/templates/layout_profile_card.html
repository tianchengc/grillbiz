<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{COMPANY}} - Profile Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Global Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b0c10;
            color: #f1f3f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 10px;
        }

        /* Centralized Card Layout */
        .profile-hub-card {
            width: 100%;
            background: rgba(20, 24, 33, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .avatar-container {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 210, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-info p {
            font-size: 0.9rem;
            color: #9ba3b2;
            line-height: 1.4;
            max-width: 320px;
        }

        /* Social Icons Row */
        .social-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .social-btn {
            padding: 10px 18px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f1f3f9;
            transition: all 0.2s;
        }

        .social-btn:hover {
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.08);
            color: #00d2ff;
            transform: translateY(-1px);
        }

        /* Links Section (Stacked Small Pill Buttons) */
        .pills-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .pill-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f1f3f9;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .pill-button:hover {
            background: #f1f3f9;
            color: #0b0c10;
            border-color: #f1f3f9;
            transform: translateX(3px);
        }

        .arrow-icon {
            font-size: 1.1rem;
            opacity: 0.6;
        }

        /* Visual Grid (Feed Look) for products/blogs */
        .section-header {
            width: 100%;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ba3b2;
            margin-top: 10px;
            align-self: flex-start;
        }

        .feed-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            aspect-ratio: 1 / 1.15;
        }

        .feed-item:hover {
            transform: translateY(-2px);
            border-color: #00d2ff;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.1);
        }

        .feed-img {
            width: 100%;
            height: 60%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.04);
        }

        .feed-details {
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .feed-title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .feed-price {
            font-size: 0.85rem;
            font-weight: 700;
            color: #ff7b00;
            margin-top: auto;
        }

        /* Themes Override */
        body.theme-glassmorphism {
            background: radial-gradient(circle at top, #141822 0%, #0d0f14 100%);
        }
        .theme-glassmorphism .pill-button:hover {
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.08);
            color: #00d2ff;
        }

        body.theme-dark-minimalist {
            background-color: #050505;
        }
        .theme-dark-minimalist .profile-hub-card {
            background: #0a0a0a;
            border-color: #1c1c1c;
        }
        .theme-dark-minimalist .avatar-container {
            border-color: rgba(255, 255, 255, 0.15);
        }
        .theme-dark-minimalist .social-btn:hover {
            background: #f1f3f9;
            color: #050505;
            border-color: #f1f3f9;
        }

        body.theme-gradient-bold {
            background: linear-gradient(135deg, #1b0a3a 0%, #0d0f26 100%);
        }
        .theme-gradient-bold .profile-hub-card {
            background: rgba(27, 10, 58, 0.7);
            border-color: rgba(255, 0, 128, 0.15);
        }
        .theme-gradient-bold .avatar-container {
            border-color: #ff007b;
        }
        .theme-gradient-bold .pill-button {
            background: linear-gradient(90deg, rgba(255, 0, 128, 0.1), rgba(123, 0, 255, 0.1));
            border-color: rgba(255, 0, 128, 0.2);
        }
        .theme-gradient-bold .pill-button:hover {
            background: linear-gradient(90deg, #ff007b, #7b00ff);
            color: #fff;
            border-color: transparent;
        }

        body.theme-classic-light {
            background-color: #f1f5f9;
            color: #0f172a;
        }
        .theme-classic-light .profile-hub-card {
            background: #ffffff;
            border-color: #cbd5e1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .theme-classic-light .avatar-container {
            border-color: #cbd5e1;
        }
        .theme-classic-light .profile-info p {
            color: #64748b;
        }
        .theme-classic-light .social-btn {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #334155;
        }
        .theme-classic-light .social-btn:hover {
            border-color: #0f172a;
            color: #0f172a;
            background: #f1f5f9;
        }
        .theme-classic-light .pill-button {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #0f172a;
        }
        .theme-classic-light .pill-button:hover {
            background: #0f172a;
            color: #ffffff;
            border-color: #0f172a;
        }
        .theme-classic-light .feed-item {
            background: #ffffff;
            border-color: #cbd5e1;
        }
        .theme-classic-light .feed-item:hover {
            border-color: #0f172a;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        /* Floating theme review selector */
        .theme-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 12, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .theme-btn {
            background: none;
            border: none;
            color: #9ba3b2;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 15px;
        }

        .theme-btn.active {
            background: #00d2ff;
            color: #0d0f14;
        }

        /* Footer */
        footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body class="theme-glassmorphism">
    <div class="phone-wrapper">
        <!-- CENTRAL PROFILE CARD -->
        <div class="profile-hub-card">
            <div class="avatar-container">
                <img src="{{LOGO_URL}}" alt="{{COMPANY}} Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
            </div>
            <div class="profile-info">
                <h1>{{COMPANY}}</h1>
                <p>{{BIO_DESCRIPTION}}</p>
            </div>
            
            <!-- SOCIAL SHARING BUTTONS -->
            <div class="social-row" id="social-container">
                <!-- Dynamically Rendered via JS -->
            </div>
        </div>

        <!-- CORE PILL LINKS -->
        <div class="pills-container" id="pills-container">
            <!-- Dynamically Rendered via JS -->
        </div>

        <!-- FEED GALLERY (Products / Blogs) -->
        <div class="section-header" id="feed-header" style="display:none;">Latest Offers & Posts</div>
        <div class="feed-grid" id="feed-container">
            <!-- Dynamically Rendered via JS -->
        </div>

        <footer>
            Powered by GrillBiz
        </footer>
    </div>

    <!-- Floating theme review selector -->
    <div class="theme-panel">
        <button class="theme-btn active" onclick="setTheme('theme-glassmorphism', this)">Glass</button>
        <button class="theme-btn" onclick="setTheme('theme-dark-minimalist', this)">Minimal</button>
        <button class="theme-btn" onclick="setTheme('theme-gradient-bold', this)">Gradient</button>
        <button class="theme-btn" onclick="setTheme('theme-classic-light', this)">Light</button>
    </div>

    <script>
        const socialData = {{SOCIAL_DATA_JSON}};
        const linksData = {{LINKS_DATA_JSON}};
        const productsData = {{PRODUCTS_DATA_JSON}};
        const blogsData = {{BLOGS_DATA_JSON}};

        function setTheme(themeName, btn) {
            document.body.className = themeName;
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function renderPage() {
            // Render Social Buttons
            const socialContainer = document.getElementById('social-container');
            socialContainer.innerHTML = '';
            if (socialData.length === 0) {
                socialContainer.style.display = 'none';
            } else {
                socialContainer.style.display = 'flex';
                socialData.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.className = 'social-btn';
                    a.target = '_blank';
                    a.innerHTML = `<span>${item.platform}</span>`;
                    socialContainer.appendChild(a);
                });
            }

            // Render Core Links (Pills)
            const pillsContainer = document.getElementById('pills-container');
            pillsContainer.innerHTML = '';
            linksData.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'pill-button';
                a.target = '_blank';
                a.innerHTML = `<span>${link.title}</span><span class="arrow-icon">→</span>`;
                pillsContainer.appendChild(a);
            });

            // Combine products and blogs into a visual gallery feed
            const feedHeader = document.getElementById('feed-header');
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = '';

            const feedItems = [];
            productsData.forEach(p => {
                feedItems.push({
                    title: p.title,
                    url: p.url,
                    image_url: p.image_url || 'https://cdn-icons-png.flaticon.com/512/3649/3649775.png',
                    price: p.price
                });
            });
            blogsData.forEach(b => {
                feedItems.push({
                    title: b.title,
                    url: b.url,
                    image_url: b.image_url || 'https://cdn-icons-png.flaticon.com/512/3135/3135679.png',
                    price: null
                });
            });

            if (feedItems.length > 0) {
                feedHeader.style.display = 'block';
                feedItems.forEach(item => {
                    const card = document.createElement('a');
                    card.className = 'feed-item';
                    card.href = item.url;
                    card.target = '_blank';
                    card.innerHTML = `
                        <img class="feed-img" src="${item.image_url}">
                        <div class="feed-details">
                            <div class="feed-title">${item.title}</div>
                            ${item.price ? `<div class="feed-price">${item.price}</div>` : ''}
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            } else {
                feedHeader.style.display = 'none';
            }
        }

        // Run
        renderPage();
    </script>
</body>
</html>
