<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{COMPANY}} — Links</title>
    <meta name="description" content="{{BIO_DESCRIPTION}}">
    <!-- Google Fonts Imports will be injected dynamically -->
    {{FONT_IMPORTS}}
    <style>
        /* ── Base Reset & Tokens ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body, 'Outfit', sans-serif);
            background: var(--body-bg, #0b0c10);
            color: var(--text-primary, #f1f3f9);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        h1, h2, h3, .section-title {
            font-family: var(--font-headers, 'Outfit', sans-serif);
        }

        .phone-wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 24px 12px;
        }

        /* ── Profile Hub Layout ── */
        .profile-card {
            width: 100%;
            background: var(--card-bg, rgba(20, 24, 33, 0.7));
            border: var(--card-border, 1px solid rgba(255, 255, 255, 0.08));
            border-radius: var(--card-radius, 20px);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            box-shadow: var(--card-shadow, 0 10px 30px rgba(0, 0, 0, 0.3));
            backdrop-filter: var(--card-blur, blur(15px));
            -webkit-backdrop-filter: var(--card-blur, blur(15px));
        }

        .avatar-container {
            width: 96px;
            height: 96px;
            border-radius: var(--avatar-radius, 50%);
            background: rgba(255, 255, 255, 0.03);
            border: var(--avatar-border, 2px solid rgba(0, 210, 255, 0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }

        .profile-info h1 {
            font-size: 1.65rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .profile-info p {
            font-size: 0.92rem;
            color: var(--text-muted, #9ba3b2);
            line-height: 1.5;
            max-width: 320px;
        }

        /* ── Social Grid (Icon pills) ── */
        .social-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            border-top: var(--divider-style, 1px solid rgba(255, 255, 255, 0.05));
            padding-top: 16px;
        }

        .social-btn {
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            background: var(--social-bg, rgba(255, 255, 255, 0.04));
            border: var(--social-border, 1px solid rgba(255, 255, 255, 0.08));
            color: var(--text-primary);
            transition: all 0.25s ease;
        }

        .social-btn:hover {
            border-color: var(--accent-color, #00d2ff);
            background: var(--social-hover-bg, rgba(0, 210, 255, 0.08));
            color: var(--accent-color, #00d2ff);
            transform: translateY(-1px);
        }

        /* ── Core Action Pills ── */
        .pills-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .pill-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 24px;
            border-radius: var(--button-radius, 30px);
            background: var(--button-bg, rgba(255, 255, 255, 0.03));
            border: var(--button-border, 1px solid rgba(255, 255, 255, 0.05));
            color: var(--button-color, #f1f3f9);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: var(--button-shadow, none);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pill-button:hover {
            background: var(--button-hover-bg, #f1f3f9);
            color: var(--button-hover-color, #0b0c10);
            border-color: var(--button-hover-border, #f1f3f9);
            transform: translateX(4px);
        }

        .arrow-icon {
            font-size: 1.05rem;
            opacity: 0.7;
        }

        /* ── Products & Updates Feed ── */
        .section-header {
            width: 100%;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted, #9ba3b2);
            margin-top: 10px;
            border-bottom: var(--divider-style, 1px solid rgba(255, 255, 255, 0.05));
            padding-bottom: 6px;
            align-self: flex-start;
        }

        .feed-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .feed-item {
            background: var(--item-bg, rgba(255, 255, 255, 0.02));
            border: var(--item-border, 1px solid rgba(255, 255, 255, 0.05));
            border-radius: var(--item-radius, 12px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: all 0.25s ease;
            aspect-ratio: 1 / 1.2;
            box-shadow: var(--item-shadow, none);
        }

        .feed-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color, #00d2ff);
            box-shadow: var(--item-hover-shadow, 0 8px 20px rgba(0, 210, 255, 0.1));
        }

        .feed-img {
            width: 100%;
            height: 55%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: var(--item-border, 1px solid rgba(255, 255, 255, 0.05));
        }

        .feed-details {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            gap: 4px;
        }

        .feed-title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .feed-price {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--price-color, #ff7b00);
            margin-top: auto;
        }

        /* ── Layout Variances (Classic Stack vs Profile Hub) ── */
        body.layout-classic {
            /* Classic has no card background for profile info, simpler stack look */
        }
        
        body.layout-classic .profile-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 10px 0;
        }

        /* ── Dynamic Scoped CSS Variable Injections ── */
        {{DYNAMIC_STYLE_CSS}}
    </style>
</head>
<body class="layout-hub">
    <div class="phone-wrapper">
        <!-- PROFILE CARD -->
        <div class="profile-card">
            <div class="avatar-container">
                <img src="{{LOGO_URL}}" alt="{{COMPANY}} Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
            </div>
            <div class="profile-info">
                <h1>{{COMPANY}}</h1>
                <p>{{BIO_DESCRIPTION}}</p>
            </div>
            
            <!-- SOCIAL GRID -->
            <div class="social-row" id="social-container">
                <!-- JS Populated -->
            </div>
        </div>

        <!-- CORE PILL LINKS -->
        <div class="pills-container" id="pills-container">
            <!-- JS Populated -->
        </div>

        <!-- PRODUCTS / BLOG FEED -->
        <div class="section-header" id="feed-header" style="display:none;">Latest Products & Posts</div>
        <div class="feed-grid" id="feed-container">
            <!-- JS Populated -->
        </div>

        <footer style="margin-top: 24px; font-size: 0.72rem; color: var(--text-muted, #64748b); text-align: center; opacity: 0.6;">
            Powered by GrillBiz
        </footer>
    </div>

    <script>
        // Data injected by parser
        const socialData = {{SOCIAL_DATA_JSON}};
        const linksData = {{LINKS_DATA_JSON}};
        const productsData = {{PRODUCTS_DATA_JSON}};
        const blogsData = {{BLOGS_DATA_JSON}};

        function renderPage() {
            // Render Social Icons
            const socialContainer = document.getElementById('social-container');
            socialContainer.innerHTML = '';
            if (!socialData || socialData.length === 0) {
                socialContainer.style.display = 'none';
            } else {
                socialContainer.style.display = 'flex';
                socialData.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.className = 'social-btn';
                    a.target = '_blank';
                    a.innerHTML = `<span>${item.platform}</span>`;
                    socialContainer.appendChild(a);
                });
            }

            // Render Core Pills
            const pillsContainer = document.getElementById('pills-container');
            pillsContainer.innerHTML = '';
            if (linksData) {
                linksData.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = 'pill-button';
                    a.target = '_blank';
                    a.innerHTML = `<span>${link.title}</span><span class="arrow-icon">→</span>`;
                    pillsContainer.appendChild(a);
                });
            }

            // Combine products and updates into visual card feed
            const feedHeader = document.getElementById('feed-header');
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = '';

            const feedItems = [];
            if (productsData) {
                productsData.forEach(p => {
                    feedItems.push({
                        title: p.title,
                        url: p.url,
                        image_url: p.image_url || 'https://cdn-icons-png.flaticon.com/512/3649/3649775.png',
                        price: p.price
                    });
                });
            }
            if (blogsData) {
                blogsData.forEach(b => {
                    feedItems.push({
                        title: b.title,
                        url: b.url,
                        image_url: b.image_url || 'https://cdn-icons-png.flaticon.com/512/3135/3135679.png',
                        price: null
                    });
                });
            }

            if (feedItems.length > 0) {
                feedHeader.style.display = 'block';
                feedItems.forEach(item => {
                    const card = document.createElement('a');
                    card.className = 'feed-item';
                    card.href = item.url;
                    card.target = '_blank';
                    card.innerHTML = `
                        <img class="feed-img" src="${item.image_url}">
                        <div class="feed-details">
                            <div class="feed-title">${item.title}</div>
                            ${item.price ? `<div class="feed-price">${item.price}</div>` : ''}
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            } else {
                feedHeader.style.display = 'none';
            }
        }

        renderPage();
    </script>
</body>
</html>
