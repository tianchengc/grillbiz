<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrillBiz · Business Cards — {{COMPANY}}</title>
    <meta name="description" content="Business card matrix for {{COMPANY}} — all team members, all styles.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #0b0d14;
            --surface: #131620;
            --surface-2: #1b1f2e;
            --border: rgba(255,255,255,0.08);
            --border-accent: rgba(0,210,255,0.3);
            --text: #f0f4ff;
            --text-muted: #7880a0;
            --accent-blue: #00d2ff;
            --accent-orange: #ff7b00;
            --tab-active-bg: rgba(0,210,255,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
        }
        [data-theme="light"] {
            --bg: #f0f4fb;
            --surface: #ffffff;
            --surface-2: #e8edf8;
            --border: rgba(0,0,0,0.08);
            --border-accent: rgba(0,130,200,0.3);
            --text: #0f1628;
            --text-muted: #5a6282;
            --tab-active-bg: rgba(0,130,200,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ── HEADER ── */
        header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header-top {
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-sub {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .link-chip {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 11px;
            border-radius: 7px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s, border-color 0.2s;
        }
        .link-chip:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

        .theme-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s, border-color 0.2s;
        }
        .theme-btn:hover { color: var(--text); border-color: var(--accent-blue); }

        .download-all-btn {
            background: linear-gradient(135deg, var(--accent-blue), #0060cc);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,210,255,0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .download-all-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0,210,255,0.35);
        }

        /* ── MEMBER TABS (sticky below header) ── */
        .member-tabs-wrapper {
            border-top: 1px solid var(--border);
            padding: 0 40px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .member-tabs-wrapper::-webkit-scrollbar { display: none; }

        /* Anchor-positioning animated underline */
        .member-tabs {
            display: flex;
            gap: 4px;
            position: relative;
            list-style: none;
            padding: 0;
        }

        /* Animated underline indicator using anchor-positioning */
        .member-tabs::before {
            content: '';
            position: absolute;
            block-size: 2px;
            background: var(--accent-blue);
            inset-block-end: 0;
            position-anchor: --active-tab;
            inset-inline-start: anchor(left);
            inset-inline-end: anchor(right);
            @media (prefers-reduced-motion: no-preference) {
                transition: inset 0.25s ease;
            }
        }
        /* Fallback for browsers without anchor positioning */
        @supports not (position-anchor: auto) {
            .member-tabs li.active a {
                border-bottom: 2px solid var(--accent-blue);
            }
        }

        .member-tabs li.active {
            anchor-name: --active-tab;
        }

        .member-tabs li a {
            display: block;
            padding: 12px 20px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: color 0.2s;
            cursor: pointer;
        }
        .member-tabs li a:hover { color: var(--text); }
        .member-tabs li.active a {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        /* ── PAGE CONTENT ── */
        .page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 40px 80px;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        /* ── MEMBER SECTION ── */
        .member-section {
            scroll-margin-top: 120px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .member-heading {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .member-name-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .member-role-heading {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* ── STYLE ROW WITHIN MEMBER ── */
        .style-rows {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .style-row {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .style-row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .style-tag {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-blue);
            background: rgba(0,210,255,0.08);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0,210,255,0.2);
        }
        .style-download-pair {
            display: flex;
            gap: 10px;
        }

        .save-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .save-btn:hover {
            color: var(--text);
            border-color: var(--accent-blue);
            background: var(--tab-active-bg);
        }

        /* ── CARD CANVAS PAIR ── */
        .card-pair {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .card-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .card-side-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* 3.5" × 2" card: 1050×600px, scaled to 50% = 525×300px display */
        .biz-card {
            width: 1050px;
            height: 600px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            transform: scale(0.5);
            transform-origin: top left;
            margin-bottom: -300px;
            margin-right: -525px;
            flex-shrink: 0;
        }

        /* ── CARD INNER STRUCTURE ── */
        .card-front {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px; gap: 20px; text-align: center;
            position: relative; z-index: 1;
        }
        .card-logo { display: flex; align-items: center; justify-content: center; }
        .card-logo img {
            max-height: 130px; max-width: 420px; object-fit: contain;
            /* mix-blend-mode and border-radius injected per-style via DYNAMIC_STYLE_CSS */
        }
        .card-company {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem; font-weight: 700; letter-spacing: -0.5px; line-height: 1;
        }
        .card-tagline { font-size: 1.2rem; font-weight: 400; opacity: 0.55; }

        .card-back {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: space-between;
            padding: 60px; gap: 40px;
            position: relative; z-index: 1;
        }
        .back-left { display: flex; flex-direction: column; gap: 10px; }
        .back-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1;
        }
        .back-role { font-size: 1.25rem; font-weight: 500; margin-bottom: 4px; }
        .back-company-tag {
            font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; opacity: 0.4;
        }
        .back-right {
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 14px; padding-left: 40px;
            border-left: 1px solid rgba(255,255,255,0.1);
            min-width: 240px;
        }
        .back-info-row { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
        .back-info-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase; opacity: 0.35;
        }
        .back-info-val { font-size: 1rem; font-weight: 500; }

        /* ── DYNAMIC STYLES (injected by card_parser.py) ── */
        {{DYNAMIC_STYLE_CSS}}
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div>
                <div class="brand-title">GrillBiz</div>
                <div class="brand-sub">Business Cards — {{COMPANY}}</div>
            </div>
            <div class="header-right">
                <nav aria-label="Social links">
                    <div style="display:flex;gap:8px;align-items:center;">
                        <a href="https://github.com/tianchengc/grillbiz" target="_blank" rel="noopener noreferrer" class="link-chip">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.74-1.33-1.74-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.48 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
                            GitHub
                        </a>
                        <span style="color:var(--border);font-size:0.8rem;">|</span>
                        <a href="https://www.linkedin.com/in/tianchengc/" target="_blank" rel="noopener noreferrer" class="link-chip">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zm1.78 13.02H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0z"/></svg>
                            LinkedIn
                        </a>
                    </div>
                </nav>
                <button class="download-all-btn" onclick="downloadAll()">
                    <span>📥</span> Download All PNGs
                </button>
                <button class="theme-btn" onclick="toggleTheme()">
                    <span id="theme-icon">☀️</span>
                    <span id="theme-text">Light</span>
                </button>
            </div>
        </div>

        <!-- Member navigation tabs -->
        <div class="member-tabs-wrapper">
            <ul class="member-tabs" role="tablist" id="member-tabs">
                {{MEMBER_TABS_HTML}}
            </ul>
        </div>
    </header>

    <main class="page" id="main-content">
        {{MEMBERS_HTML}}
    </main>

    <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center;">
        <div>Designed & generated via <strong>GrillBiz Card Matrix</strong></div>
        <div style="font-size: 0.78rem; opacity: 0.8;">Design System powered by <a href="https://uupm.cc" target="_blank" rel="noopener noreferrer" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">UI/UX Pro Max</a></div>
    </footer>

    <script>
        const cardsData = {{CARDS_DATA_JSON}};

        // ── Theme toggle ──
        function toggleTheme() {
            const html = document.documentElement;
            const isNowLight = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isNowLight ? 'light' : 'dark');
            document.getElementById('theme-icon').textContent = isNowLight ? '🌙' : '☀️';
            document.getElementById('theme-text').textContent = isNowLight ? 'Dark' : 'Light';
        }

        // ── Tab active state sync on scroll ──
        const tabs = document.querySelectorAll('.member-tabs li');
        const sections = document.querySelectorAll('.member-section');

        function syncTab(activeId) {
            tabs.forEach(tab => {
                const isActive = tab.dataset.member === activeId;
                tab.classList.toggle('active', isActive);
                tab.querySelector('a').setAttribute('aria-current', isActive ? 'true' : 'false');
            });
        }

        // Feature-detect scrollsnapchange, fallback to IntersectionObserver
        if ('onscrollsnapchange' in HTMLElement.prototype) {
            document.getElementById('main-content').addEventListener('scrollsnapchange', e => {
                const snap = e.snapTargetBlock;
                if (snap) syncTab(snap.dataset.memberId);
            });
        } else {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) syncTab(entry.target.dataset.memberId);
                });
            }, { rootMargin: '-40% 0px -50% 0px', threshold: 0 });
            sections.forEach(s => observer.observe(s));
        }

        // Tab click: smooth scroll to member section
        tabs.forEach(tab => {
            tab.querySelector('a').addEventListener('click', e => {
                e.preventDefault();
                const target = document.getElementById(`member-${tab.dataset.member}`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                syncTab(tab.dataset.member);
            });
        });

        // Set first tab active on load
        if (tabs.length > 0) syncTab(tabs[0].dataset.member);

        // ── Save individual card ──
        function saveCard(cardId, filename) {
            const el = document.getElementById(cardId);
            if (!el) return;
            const savedTransform = el.style.transform;
            const savedMarginBottom = el.style.marginBottom;
            const savedMarginRight = el.style.marginRight;
            el.style.transform = 'none';
            el.style.marginBottom = '0';
            el.style.marginRight = '0';

            html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true }).then(canvas => {
                el.style.transform = savedTransform;
                el.style.marginBottom = savedMarginBottom;
                el.style.marginRight = savedMarginRight;
                const a = document.createElement('a');
                a.download = `${filename}.png`;
                a.href = canvas.toDataURL('image/png');
                a.click();
            });
        }

        // ── Download all ──
        function downloadAll() {
            let delay = 0;
            cardsData.forEach(member => {
                member.styles.forEach(style => {
                    setTimeout(() => saveCard(`card-${member.id}-${style.id}-front`, `${member.id}_${style.id}_front`), delay);
                    delay += 600;
                    setTimeout(() => saveCard(`card-${member.id}-${style.id}-back`, `${member.id}_${style.id}_back`), delay);
                    delay += 600;
                });
            });
        }
    </script>
</body>
</html>
